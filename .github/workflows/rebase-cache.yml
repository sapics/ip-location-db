name: cache histories delete by rebase

on:
  schedule:
    - cron: '37 13 20 * *'

jobs:
  release:
    name: cache histories delete by rebase
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          repository: sapics/ip-location-mini-cache
          token: ${{secrets.GH_TOKEN}}

      - name: rebase
        shell: bash
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout --orphan temp_branch > /dev/null 2>&1
          git add -A > /dev/null 2>&1
          git commit -am "Initial rebased commit" > /dev/null 2>&1
          git branch -D main > /dev/null 2>&1
          git branch -m main > /dev/null 2>&1
          git push -f origin main > /dev/null 2>&1
        env:
          GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
