name: src-update
on:
  schedule:
    - cron: '55 18 * * *'
  workflow_dispatch:

permissions: write-all
jobs:
  release:
    name: Update database
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          token: ${{secrets.GH_TOKEN}}
          ref: main
          
      - name: checkout src
        uses: actions/checkout@v6
        with:
          repository: sapics/ip-location-mini-src
          path: src
          token: ${{secrets.GH_TOKEN}}
          
      - name: checkout cache
        uses: actions/checkout@v6
        with:
          repository: sapics/ip-location-mini-cache
          path: src/cache
          token: ${{secrets.GH_TOKEN}}
          
      - name: checkout bgp
        uses: actions/checkout@v6
        with:
          repository: sapics/ip-location-mini-bgp
          path: src/bgp
          token: ${{secrets.GH_TOKEN}}
          
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: "24.15"
          registry-url: 'https://registry.npmjs.org'
          
      - name: update
        run: src/scripts/main-update.sh
        
      - name: Download ip-location-to-mmdb
        shell: bash
        run: |
          wget https://github.com/paul-norman/ip-location-to-mmdb/releases/download/v1.04/ip-location-to-mmdb-linux-x64.bin -q -O ./ip-location-to-mmdb-linux-x64.bin
          chmod +x ./ip-location-to-mmdb-linux-x64.bin
          
      - name: Update mmdb files
        shell: bash
        run: node tools/create-mmdb.js
        
      - name: commit
        run: ./tools/commit.sh
        env:
          GITHUB_TOKEN: ${{secrets.GH_TOKEN}}

      # Push changes first to ensure the remote repository is up-to-date
      - name: push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{secrets.GH_TOKEN}}
          repository: sapics/ip-location-db
          branch: main

      - name: Get current time
        uses: josStorer/get-current-time@v2
        id: current-time
        with:
          format: "YYYY-MM-DD HH:mm:ss"
          
      # Finally, create a release targeting the newly pushed commit
      - name: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest Release"
          body: |
            Latest updates: ${{ steps.current-time.outputs.formattedTime }} (UTC)

            SHA-256 checksum files are available in the [Checksum Release](https://github.com/sapics/ip-location-db/releases/tag/checksum).

            To get the checksum URL, replace `/download/latest/` with `/download/checksum/` and append `.sha256` to the filename.

            - File: [https://github.com/sapics/ip-location-db/releases/download/latest/user-country-ipv4.csv](https://github.com/sapics/ip-location-db/releases/download/latest/user-country-ipv4.csv)
            - SHA-256: [https://github.com/sapics/ip-location-db/releases/download/checksum/user-country-ipv4.csv.sha256](https://github.com/sapics/ip-location-db/releases/download/checksum/user-country-ipv4.csv.sha256)
          files: |
            */*.csv
            */*.csv.7z
            */*.csv.gz
            */*.mmdb
        env:
          GITHUB_TOKEN: ${{secrets.GH_TOKEN}}

      - name: Create checksum files
        shell: bash
        run: |
          for file in */*.csv */*.csv.7z */*.csv.gz */*.mmdb; do
            if [[ ! -f "$file" ]]; then
              continue
            fi

            directory=$(dirname "$file")
            filename=$(basename "$file")
            (
              cd "$directory"
              sha256sum "$filename" > "$filename.sha256"
            )
          done

      - name: checksum release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: checksum
          name: "Checksum"
          body: |
            SHA-256 checksums for the [Latest Release](https://github.com/sapics/ip-location-db/releases/tag/latest).

            Latest updates: ${{ steps.current-time.outputs.formattedTime }} (UTC)
          make_latest: false
          overwrite_files: true
          files: |
            */*.csv.sha256
            */*.csv.7z.sha256
            */*.csv.gz.sha256
            */*.mmdb.sha256
        env:
          GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
